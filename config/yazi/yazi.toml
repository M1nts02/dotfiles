[mgr]
sort_sensitive = false
sort_reverse = false
show_symlink = true
ratio = [0, 1, 1]

[opener]
archive = [
  { run = "open %s", desc = "Open" },
  { run = "ya pub extract --list %s", desc = "Extract here" },
]
text = [
  { run = "open %s", desc = "Open" },
  { run = "nvim %s", block = true },
]
image = [
  { run = "open %s", desc = "Open" },
  { run = '''exiftool %s1; echo "Press enter to exit"; read''', block = true, desc = "Show EXIF" },
]
video = [
  { run = "open %s", desc = "Open" },
  { run = '''mediainfo %s1; echo "Press enter to exit"; read''', block = true, desc = "Show media info" },
]
audio = [
  { run = "open %s", desc = "Open" },
  { run = '''mediainfo %s1; echo "Press enter to exit"; read''', block = true, desc = "Show media info" },
]
dmg = [
  { run = "hdiutil attach %s", desc = "Mount DMG", block = true },
]
fallback = [
  { run = "open -R %s", desc = "Reveal in Finder", for = "unix" },
  { run = "mdrop -e %s", desc = "mDrop", for = "unix" },
]

[open]
rules = [
  { url = "*/", use = ["fallback", "folder"] },
  { mime = "text/*", use = ["text", "fallback"] },
  { mime = "image/*", use = ["image", "fallback"] },
  { mime = "video/*", use = ["video", "fallback"] },
  { mime = "audio/*", use = ["audio", "fallback"] },
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [
    "archive",
    "fallback"
  ] },
  { mime = "application/zlib", use = ["dmg", "fallback"] },
  { url = "*", use = ["text", "fallback"] },
]

[tasks]
file_workers = 5
plugin_workers = 10
bizarre_retry = 5
image_alloc = 1073741824
image_bound = [65535, 65535]

[log]
enabled = false

[preview]
wrap = "yes"
max_width = 3000
max_height = 3000
image_quality = 70
image_filter = "nearest"

[plugin]
prepend_fetchers = []
append_fetchers = []
prepend_preloaders = [
  { mime = "{audio,video,image}/*", run = "mediainfo" },
  { mime = "application/subrip", run = "mediainfo" },
  { mime = "application/postscript", run = "mediainfo" },
]
prepend_previewers = [
  { mime = "{audio,video}/*", run = "mediainfo" },
  { mime = "application/subrip", run = "mediainfo" },
  { mime = "application/postscript", run = "mediainfo" },
]
