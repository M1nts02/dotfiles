patch:
  app_options:
    com.apple.Spotlight:
      ascii_mode: true
      vim_mode: true
    org.alacritty:
      ascii_mode: true
      vim_mode: true
    com.brave.Browser:
      ascii_mode: true
      vim_mode: true
    com.microsoft.VSCode:
      ascii_mode: true
      vim_mode: true
    com.github.wez.wezterm:
      ascii_mode: true
      vim_mode: true
    org.vim.MacVim:
      ascii_mode: true
      vim_mode: true
  schema_list:
    - schema: rime_ice # 雾凇拼音（全拼）
    - schema: japanese
  app_options:
    com.apple.Spotlight:
      ascii_mode: true
      vim_mode: true
    org.alacritty:
      ascii_mode: true
      vim_mode: true
    com.brave.Browser:
      ascii_mode: true
      vim_mode: true
    com.microsoft.VSCode:
      ascii_mode: true
      vim_mode: true
    com.github.wez.wezterm:
      ascii_mode: true
      vim_mode: true
  keyboard_layout: default
  chord_duration: 0.1
  show_notifications_when: appropriate
  app_options:
    com.apple.Spotlight:
      ascii_mode: true
      vim_mode: true
    org.alacritty:
      ascii_mode: true
      vim_mode: true
    com.brave.Browser:
      ascii_mode: true
      vim_mode: true
    com.microsoft.VSCode:
      ascii_mode: true
      vim_mode: true
    com.github.wez.wezterm:
      ascii_mode: true
      vim_mode: true
  style:
    color_scheme: aqua
    color_scheme_dark: mint_dark_blue
    # 预设选项。如果皮肤没写，则使用这些属性；如果皮肤写了，使用皮肤的。
    text_orientation: horizontal # horizontal | vertical
    inline_preedit: true
    corner_radius: 10
    hilited_corner_radius: 0
    border_height: 0
    border_width: 0
    line_spacing: 5
    spacing: 10
    #candidate_format: '%c. %@'
    #base_offset: 6
    font_face: "Lucida Grande"
    font_point: 15
    #label_font_face: 'Lucida Grande'
    label_font_point: 15
    #comment_font_face: 'Lucida Grande'
    comment_font_point: 15
  # 皮肤列表
  preset_color_schemes:
    aqua:
      name: 碧水／Aqua
      author: 佛振 <chen.sst@gmail.com>
      text_color: 0x606060
      back_color: 0xeeeceeee
      candidate_text_color: 0x000000
      hilited_text_color: 0x000000
      hilited_candidate_text_color: 0xffffff
      hilited_candidate_back_color: 0xeefa3a0a
      comment_text_color: 0x5a5a5a
      hilited_comment_text_color: 0xfcac9d
    mint_dark_blue:
      name: 黑水鸭／Mint Dark Blue
      author: Mintimate <"Mintimate's Blog">
      translucency: true # 磨砂： false | true
      mutual_exclusive: false # 色不叠加： false | true
      shadow_size: 0 # 阴影大小
      line_spacing: 5 # 行间距
      # base_offset: 0                          # 字基高(Action版本鼠须管会崩溃)
      alpha: 1 # 透明度，0~1
      spacing: 10 # 拼音与候选项之间的距离 （inline_preedit: false）
      back_color: 0x424242 # 底色
      hilited_candidate_back_color: 0xc6c01a # 选中底色
      label_color: 0xefefef # 序号颜色
      hilited_candidate_label_color: 0xefefef # 选中序号颜色
      candidate_text_color: 0xefefef # 文字颜色
      hilited_candidate_text_color: 0xefefef # 选中文字颜色
      comment_text_color: 0xefefef # 注颜色
      hilited_comment_text_color: 0xffffff # 选中注颜色
      text_color: 0x6495ed # 拼音颜色 （inline_preedit: false）
      hilited_text_color: 0xc6c01a # 选中拼音颜色 （inline_preedit: false）
